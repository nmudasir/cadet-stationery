<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Suite | Cadet Stationery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-login-container {
            max-width: 450px;
            margin: 15% auto;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 50px;
            text-align: center;
        }
        .dashboard-container {
            display: none;
            padding: 100px 5%;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 30px;
            text-align: center;
        }
        .stat-card h4 {
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }
        .stat-card p {
            font-size: 2rem;
            font-weight: 700;
        }
        .product-manager {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 40px;
        }
        .product-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }
        .product-table th, .product-table td {
            text-align: left;
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
        }
        .product-table th {
            color: var(--accent-gold);
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .action-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-white);
            padding: 5px 15px;
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .action-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }
        .hidden { display: none; }
    </style>
</head>

<body>
    <header>
        <a href="index.html" class="logo">CADET <span>EXECUTIVE</span></a>
        <div>
            <button id="logoutBtn" class="action-btn hidden" onclick="adminLogout()">Logout</button>
        </div>
    </header>

    <!-- Login Area -->
    <div id="loginArea" class="admin-login-container">
        <h2 style="margin-bottom: 30px;">Access Secure Suite</h2>
        <div class="input-group" style="text-align: left;">
            <label>Username</label>
            <input type="text" id="adminUsername" placeholder="Enter ID">
        </div>
        <div class="input-group" style="text-align: left;">
            <label>Security Key</label>
            <input type="password" id="adminPassword" placeholder="••••••••">
        </div>
        <button class="btn-premium" style="width: 100%; margin-top: 20px;" onclick="adminLogin()">Authenticate</button>
    </div>

    <!-- Dashboard Area -->
    <div id="dashboardArea" class="dashboard-container">
        <h1 style="margin-bottom: 50px;">Store Commander</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h4>Total Items</h4>
                <p id="totalProducts">3</p>
            </div>
            <div class="stat-card">
                <h4>Inquiries</h4>
                <p>12</p>
            </div>
            <div class="stat-card">
                <h4>Portfolio Value</h4>
                <p>Rs. 135k</p>
            </div>
        </div>

        <div class="product-manager">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Inventory Control</h3>
                <button class="action-btn" onclick="openAddModal()">+ Add New Product</button>
            </div>

            <table class="product-table">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="adminProductRoot">
                    <!-- Dynamic Content -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
